<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPT Extension Settings</title>
    <link rel="stylesheet" href="/src/popup/popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="popup-header">
            <img src="/public/icons/128.png" alt="Logo" class="popup-logo">
            <span class="popup-title">GPT Quick Reply</span>
        </div>
        <div class="theme-toggle-row">
            <button id="themeToggle" class="theme-toggle-btn" title="Toggle theme">
                <span id="themeIcon" class="theme-icon"></span>
            </button>
            <span class="toggle-label" id="themeLabel">Light</span>
        </div>
        <label class="model-label" id="modelLabel">
            <span>Model:</span>
            <select id="modelSelect" disabled></select>
        </label>
        <div id="modelStatus" class="model-status" role="status" aria-live="polite"></div>
        <button id="clearModelCache" class="secondary-button" type="button">Clear model cache</button>
        <label class="tokens-label">
            <span>Max tokens:</span>
            <input type="number" id="maxTokens" min="100" max="2500" step="1" value="256">
        </label>
        <label class="api-label">
            <span>API Key:</span>
            <input type="text" id="apiKey" placeholder="sk-...">
        </label>
        <div class="toggle-row">
            <span>Enable on this site:</span>
            <label class="toggle-switch">
                <input type="checkbox" id="enableSite">
                <span class="slider"></span>
            </label>
        </div>
        <button id="save">Save</button>
        <span id="status"></span>
    </div>
    <script src="/src/popup/popup.js"></script>
</body>
</html>
